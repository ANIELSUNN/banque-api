<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accueil</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #eef5ff, #f7f9fc);
      color: #1f2937;
    }
    .hero {
      max-width: 1000px;
      margin: 80px auto;
      text-align: center;
      padding: 40px 20px;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 16px;
    }
    p {
      font-size: 18px;
      color: #4b5563;
      margin-bottom: 24px;
    }
    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    a.button {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }
    a.primary {
      background: #0d6efd;
      color: white;
    }
    a.secondary {
      background: #e9ecef;
      color: #0d1117;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Bienvenue sur Comptoir Bancaire</h1>
    <p>Gérez vos comptes, consultez votre profil et profitez d’une expérience simple et sécurisée.</p>
    <div class="actions">
      <a class="button primary" href="register.html">Créer un compte</a>
      <a class="button secondary" href="login.html">Se connecter</a>
    </div>
  </div>
</body>
</html>
