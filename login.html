<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef5ff, #f7f9fc);
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .box {
      width: 100%;
      max-width: 420px;
      background: white;
      padding: 32px 28px;
      border-radius: 16px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
    }
    h2 {
      margin: 0 0 8px;
      text-align: center;
      color: #0f172a;
      font-size: 28px;
    }
    .subtitle {
      text-align: center;
      color: #64748b;
      font-size: 14px;
      margin-bottom: 18px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 12px;
      box-sizing: border-box;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      outline: none;
      font-size: 14px;
    }
    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(90deg, #198754, #16a34a);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
      transition: transform 0.1s ease;
    }
    button:hover { transform: translateY(-1px); }
    .message {
      margin-top: 10px;
      font-size: 14px;
      min-height: 20px;
      text-align: center;
    }
    .success { color: #15803d; }
    .error { color: #dc2626; }
    .footer {
      text-align: center;
      margin-top: 14px;
      font-size: 14px;
    }
    .footer a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Connexion</h2>
    <div class="subtitle">Accédez à votre espace bancaire</div>
    <form id="loginForm" novalidate>
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Mot de passe" required />
      <button type="submit">Se connecter</button>
    </form>
    <div id="message" class="message"></div>
    <div class="footer">
      <a href="register.html">Créer un compte</a>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      setMessage(message, '', '');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        setMessage(message, 'Veuillez remplir tous les champs.', 'error');
        return;
      }

      try {
        const result = await requestJson('/api/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });

        setMessage(message, result.message, 'success');

        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 800);
      } catch (error) {
        setMessage(message, error.message, 'error');
      }
    });
  </script>
</body>
</html>
