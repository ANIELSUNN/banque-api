<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tableau de bord</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef5ff, #f7f9fc);
      margin: 0;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .card {
      max-width: 760px;
      margin: 40px auto;
      background: white;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
    }
    h2 { margin: 0 0 10px; color: #0f172a; }
    .welcome {
      color: #475569;
      margin-bottom: 16px;
    }
    button {
      background: #dc3545;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      margin-right: 8px;
      font-weight: 600;
    }
    .profile-link {
      display: inline-block;
      color: #2563eb;
      text-decoration: none;
      font-weight: bold;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Bienvenue</h2>
    <p class="welcome" id="welcomeText">Chargement...</p>
    <a class="profile-link" href="profile.html">Voir mon profil</a>
    <div style="margin-top: 12px;">
      <button id="logoutBtn">Se déconnecter</button>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    const welcomeText = document.getElementById('welcomeText');
    const logoutBtn = document.getElementById('logoutBtn');

    async function loadUser() {
      try {
        const data = await requestJson('/api/me');
        welcomeText.textContent = `Bonjour ${data.user.nom || data.user.email} !`;
      } catch (error) {
        window.location.replace('login.html');
      }
    }

    logoutBtn.addEventListener('click', async () => {
      try {
        await requestJson('/api/logout', { method: 'POST' });
      } catch (error) {
        // ignore logout errors and still redirect
      }
      window.location.href = 'login.html';
    });

    loadUser();
  </script>
</body>
</html>
