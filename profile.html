<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profil</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef5ff, #f7f9fc);
      margin: 0;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .card {
      max-width: 640px;
      margin: 40px auto;
      background: white;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
    }
    h2 { margin: 0 0 18px; color: #0f172a; }
    .info {
      margin: 12px 0;
      color: #334155;
    }
    button {
      background: #0d6efd;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      margin-right: 8px;
      font-weight: 600;
    }
    button.danger { background: #dc3545; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Mon profil</h2>
    <div class="info"><strong>Nom :</strong> <span id="nom"></span></div>
    <div class="info"><strong>Prénom :</strong> <span id="prenom"></span></div>
    <div class="info"><strong>Email :</strong> <span id="email"></span></div>
    <button onclick="window.location.href='dashboard.html'">Retour au tableau de bord</button>
    <button class="danger" id="logoutBtn">Se déconnecter</button>
  </div>

  <script src="js/auth.js"></script>
  <script>
    async function loadProfile() {
      try {
        const data = await requestJson('/api/me');
        const user = data.user;
        document.getElementById('nom').textContent = user.nom || '—';
        document.getElementById('prenom').textContent = user.prenom || '—';
        document.getElementById('email').textContent = user.email || '—';
      } catch (error) {
        window.location.replace('login.html');
      }
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      try {
        await requestJson('/api/logout', { method: 'POST' });
      } catch (error) {
        // ignore logout errors and still redirect
      }
      window.location.href = 'login.html';
    });

    loadProfile();
  </script>
</body>
</html>
